<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" width="700" height="420">
  <defs>
    <style>
      .box { fill: #fff; stroke: #232f3e; stroke-width: 2; rx: 6; }
      .aws-box { fill: #ff9900; stroke: #232f3e; stroke-width: 2; rx: 6; }
      .text { font-family: Arial, sans-serif; font-size: 13px; fill: #232f3e; text-anchor: middle; }
      .title { font-family: Arial, sans-serif; font-size: 12px; fill: #fff; text-anchor: middle; font-weight: bold; }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#333"/>
    </marker>
  </defs>
  <rect width="700" height="420" fill="#f8f9fa"/>
  <text x="350" y="28" class="text" font-size="16" font-weight="bold">Serverless REST API - Solution Architecture</text>
  
  <!-- User -->
  <rect x="285" y="50" width="130" height="50" class="box"/>
  <text x="350" y="82" class="text">User / Browser</text>
  
  <!-- S3 -->
  <rect x="50" y="140" width="130" height="70" class="aws-box"/>
  <text x="115" y="170" class="title">Amazon S3</text>
  <text x="115" y="192" class="title" font-size="10">Static Frontend</text>
  
  <!-- API Gateway -->
  <rect x="285" y="140" width="130" height="70" class="aws-box"/>
  <text x="350" y="170" class="title">API Gateway</text>
  <text x="350" y="192" class="title" font-size="10">REST API</text>
  
  <!-- Lambda -->
  <rect x="285" y="250" width="130" height="70" class="aws-box"/>
  <text x="350" y="282" class="title">Lambda</text>
  <text x="350" y="302" class="title" font-size="10">CRUD Functions</text>
  
  <!-- DynamoDB -->
  <rect x="520" y="140" width="130" height="70" class="aws-box"/>
  <text x="585" y="170" class="title">DynamoDB</text>
  <text x="585" y="192" class="title" font-size="10">Todo Table</text>
  
  <!-- CloudWatch -->
  <rect x="520" y="250" width="130" height="70" class="aws-box"/>
  <text x="585" y="285" class="title">CloudWatch</text>
  <text x="585" y="305" class="title" font-size="10">Logs &amp; Monitor</text>
  
  <!-- Arrows -->
  <line x1="350" y1="100" x2="350" y2="140" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="350" y1="210" x2="350" y2="250" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="415" y1="175" x2="520" y2="175" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="415" y1="285" x2="520" y2="285" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="115" y1="175" x2="230" y2="100" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="230" y1="100" x2="285" y2="175" stroke="#333" stroke-width="2"/>
</svg>